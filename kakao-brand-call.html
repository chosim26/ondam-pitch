<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
</style></head>
<body>
<div style="width:1200px;height:675px;background:linear-gradient(160deg,#FFF8F5 0%,#FFE8E0 35%,#FFD4C8 65%,#FF6B6B 100%);display:flex;align-items:center;position:relative;overflow:hidden;padding:0 80px;">

  <!-- Background decorations -->
  <div style="position:absolute;top:-100px;right:80px;width:420px;height:420px;border-radius:50%;background:rgba(255,255,255,0.25);"></div>
  <div style="position:absolute;top:60px;right:220px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.15);"></div>
  <div style="position:absolute;bottom:-80px;left:40%;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,0.12);"></div>
  <div style="position:absolute;top:40px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,107,107,0.08);"></div>
  <div style="position:absolute;bottom:30px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.2);"></div>
  <div style="position:absolute;top:120px;left:200px;width:12px;height:12px;border-radius:50%;background:rgba(255,107,107,0.15);"></div>
  <div style="position:absolute;bottom:140px;left:350px;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>

  <!-- Left: Text -->
  <div style="flex:1;z-index:2;">
    <img src="./logo.png" style="height:64px;margin-bottom:28px;" alt="온담">
    <h1 style="font-size:54px;font-weight:800;color:#2D2D2D;line-height:1.3;letter-spacing:-1px;margin-bottom:20px;">
      혼자 고민하지 마세요,<br><span style="color:#FF6B6B;">온담</span>이 들어드릴게요.
    </h1>
    <p style="font-size:24px;color:#777;line-height:1.7;font-weight:400;">
      전화 한 통이면 충분합니다.<br>
      자식처럼 곁에서 함께 해결해요.
    </p>
  </div>

  <!-- Right: Phone call illustration -->
  <div style="z-index:2;display:flex;flex-direction:column;align-items:center;gap:20px;">
    <!-- Phone mockup -->
    <div style="background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-radius:32px;padding:36px 40px;box-shadow:0 8px 32px rgba(0,0,0,0.08);text-align:center;min-width:320px;">
      <div style="font-size:64px;margin-bottom:16px;">📞</div>
      <div style="font-size:26px;font-weight:800;color:#333;margin-bottom:8px;">고민 해결 전화</div>
      <div style="font-size:17px;color:#999;line-height:1.6;margin-bottom:24px;">
        병원 예약이 어려울 때<br>
        관공서 서류가 복잡할 때<br>
        어디에 물어봐야 할지 모를 때
      </div>
      <div style="background:#FF6B6B;color:white;padding:16px 40px;border-radius:999px;font-size:20px;font-weight:700;display:inline-block;box-shadow:0 4px 16px rgba(255,107,107,0.3);">
        온담에 전화하기
      </div>
    </div>
    <div style="font-size:15px;color:rgba(255,255,255,0.7);font-weight:500;">자식 대신 온담이 해드립니다</div>
  </div>
</div>
</body></html>
