<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
</style></head>
<body>
<div style="width:1200px;height:675px;background:linear-gradient(160deg,#FFF8F5 0%,#FFE8E0 35%,#FFD4C8 65%,#FF6B6B 100%);display:flex;align-items:center;position:relative;overflow:hidden;padding:0 80px;">

  <!-- Background decorations -->
  <div style="position:absolute;top:-100px;right:80px;width:420px;height:420px;border-radius:50%;background:rgba(255,255,255,0.25);"></div>
  <div style="position:absolute;top:60px;right:220px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.15);"></div>
  <div style="position:absolute;bottom:-80px;left:40%;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,0.12);"></div>
  <div style="position:absolute;top:40px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,107,107,0.08);"></div>
  <div style="position:absolute;bottom:30px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.2);"></div>
  <div style="position:absolute;top:120px;left:200px;width:12px;height:12px;border-radius:50%;background:rgba(255,107,107,0.15);"></div>
  <div style="position:absolute;bottom:140px;left:350px;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>

  <!-- Left: Text -->
  <div style="flex:1;z-index:2;">
    <img src="./logo.png" style="height:64px;margin-bottom:28px;" alt="온담">
    <h1 style="font-size:54px;font-weight:800;color:#2D2D2D;line-height:1.3;letter-spacing:-1px;margin-bottom:20px;">
      나오기만 하세요,<br>나머지는 <span style="color:#FF6B6B;">온담</span>이.
    </h1>
    <p style="font-size:24px;color:#777;line-height:1.7;font-weight:400;">
      모임 기획 · 장소 예약 · 사람 연결<br>
      온담이 전부 준비합니다.
    </p>
  </div>

  <!-- Right: Moim cards -->
  <div style="display:flex;flex-direction:column;gap:14px;z-index:2;">
    <div style="background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:22px;padding:24px 32px;display:flex;align-items:center;gap:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06);min-width:340px;">
      <div style="width:52px;height:52px;border-radius:16px;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">🚶</div>
      <div>
        <div style="font-size:20px;font-weight:700;color:#333;">도심 산책 모임</div>
        <div style="font-size:15px;color:#aaa;">서촌 · 북촌 · 한강 함께 걸어요</div>
      </div>
    </div>
    <div style="background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:22px;padding:24px 32px;display:flex;align-items:center;gap:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06);min-width:340px;">
      <div style="width:52px;height:52px;border-radius:16px;background:#FFF3E0;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">🍽️</div>
      <div>
        <div style="font-size:20px;font-weight:700;color:#333;">맛집 탐방 모임</div>
        <div style="font-size:15px;color:#aaa;">좋은 사람들과 맛있는 한 끼</div>
      </div>
    </div>
    <div style="background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:22px;padding:24px 32px;display:flex;align-items:center;gap:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06);min-width:340px;">
      <div style="width:52px;height:52px;border-radius:16px;background:#F3E5F5;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">🎨</div>
      <div>
        <div style="font-size:20px;font-weight:700;color:#333;">문화 나들이 모임</div>
        <div style="font-size:15px;color:#aaa;">전시 · 공연 · 영화 함께 즐겨요</div>
      </div>
    </div>
    <div style="background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:22px;padding:24px 32px;display:flex;align-items:center;gap:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06);min-width:340px;">
      <div style="width:52px;height:52px;border-radius:16px;background:#E0F2F1;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">⛰️</div>
      <div>
        <div style="font-size:20px;font-weight:700;color:#333;">가벼운 등산 모임</div>
        <div style="font-size:15px;color:#aaa;">건강한 만남, 초보 코스로</div>
      </div>
    </div>
  </div>
</div>
</body></html>
