<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1A1A1A;
    overflow: hidden;
  }

  .card {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #2A2019 0%, #1E1610 100%);
    border-radius: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Top badge */
  .badge {
    position: absolute;
    top: 36px;
    left: 36px;
    background: #FF6B6B;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 90px 60px 36px;
  }

  .header h1 {
    color: #FFFFFF;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.35;
  }

  .header h1 .brand {
    color: #FF6B6B;
  }

  /* Comparison table */
  .comparison {
    flex: 1;
    margin: 0 60px;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Table header */
  .table-header {
    display: flex;
    height: 60px;
    font-size: 22px;
    font-weight: 700;
  }

  .table-header .left {
    flex: 1;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .table-header .vs {
    width: 56px;
    background: #FF6B6B;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    border-radius: 999px;
    margin: 8px -12px;
    z-index: 2;
    box-shadow: 0 4px 12px rgba(255,107,107,0.4);
  }

  .table-header .right {
    flex: 1;
    background: rgba(255,107,107,0.15);
    color: #FF6B6B;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* Rows */
  .row {
    display: flex;
    flex: 1;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .row .left {
    flex: 1;
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    padding: 0 36px;
    gap: 16px;
    color: rgba(255,255,255,0.4);
    font-size: 28px;
    font-weight: 500;
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.2);
  }

  .row .left .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  .row .right {
    flex: 1;
    background: linear-gradient(135deg, rgba(255,107,107,0.18) 0%, rgba(255,107,107,0.12) 100%);
    display: flex;
    align-items: center;
    padding: 0 36px;
    gap: 16px;
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 700;
  }

  .row .right .check {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #FF6B6B;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .row .right .check svg {
    width: 18px;
    height: 18px;
  }

  /* Footer */
  .footer {
    height: 110px;
    padding: 0 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .footer-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .footer-left img {
    height: 48px;
  }

  .footer-left .tagline {
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    font-weight: 400;
  }

  .cta-btn {
    background: #FF6B6B;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    padding: 16px 36px;
    border-radius: 999px;
    border: none;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="badge">50대 이상 전용 모임앱</div>

  <div class="header">
    <h1>기존 앱과 <span class="brand">온담</span>,<br>뭐가 다를까요?</h1>
  </div>

  <div class="comparison">
    <div class="table-header">
      <div class="left">기존 앱들</div>
      <div class="vs">VS</div>
      <div class="right">온담</div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>어색한 1:1 만남</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        편안한 그룹 모임
      </div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>외모 · 스펙 중심</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        취미 · 동네 기반
      </div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>젊은 사람 위주</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        50대 이상 전용
      </div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>복잡한 앱 사용법</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        쉽고 간단한 UI
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left">
      <img src="/Users/admin/chosim/ondam-promo/instagram/ondam-logo.png" alt="온담">
      <span class="tagline">좋은 모임, 따뜻한 만남</span>
    </div>
    <div class="cta-btn">지금 무료 가입 →</div>
  </div>
</div>
</body>
</html>
