<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1A1A1A;
    overflow: hidden;
  }
  .card {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #2A1E1A 0%, #1A1410 100%);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Badge */
  .badge {
    position: absolute;
    top: 32px;
    left: 0;
    right: 0;
    text-align: center;
    color: #FF6B6B;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 70px 40px 28px;
  }
  .header h1 {
    color: #FFFFFF;
    font-size: 42px;
    font-weight: 800;
    line-height: 1.3;
  }
  .header h1 .brand {
    color: #FF6B6B;
  }

  /* Table */
  .comparison {
    flex: 1;
    margin: 0 32px;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .table-header {
    display: flex;
    height: 52px;
    position: relative;
  }
  .table-header .left-h {
    flex: 1;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    font-weight: 700;
    gap: 8px;
  }
  .table-header .vs {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 48px;
    height: 48px;
    background: #FF6B6B;
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    z-index: 2;
    box-shadow: 0 4px 16px rgba(255,107,107,0.5);
  }
  .table-header .right-h {
    flex: 1;
    background: rgba(255,107,107,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FF8E8E;
    font-size: 20px;
    font-weight: 700;
    gap: 8px;
  }

  /* Rows */
  .row {
    display: flex;
    flex: 1;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .row .left {
    flex: 1;
    background: rgba(255,255,255,0.03);
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 14px;
    color: rgba(255,255,255,0.45);
    font-size: 24px;
    font-weight: 500;
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.15);
  }
  .row .left .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    flex-shrink: 0;
  }
  .row .right {
    flex: 1;
    background: #FF6B6B;
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 14px;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 700;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .row:nth-child(odd) .right {
    background: #FF7777;
  }
  .row .right .check {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .row .right .check svg {
    width: 16px;
    height: 16px;
  }

  /* Bottom message */
  .bottom-msg {
    text-align: center;
    padding: 16px 0 0;
    color: #FF6B6B;
    font-size: 20px;
    font-weight: 600;
  }

  /* Footer */
  .footer {
    height: 90px;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .footer-left img {
    height: 44px;
  }
  .footer-left .tagline {
    color: rgba(255,255,255,0.45);
    font-size: 18px;
    font-weight: 400;
  }
  .cta-btn {
    background: #FF6B6B;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    padding: 14px 32px;
    border-radius: 999px;
    border: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="badge">50대 이상 모임앱 비교</div>

  <div class="header">
    <h1>기존 앱과 <span class="brand">온담</span>, 뭐가 다를까요?</h1>
  </div>

  <div class="comparison">
    <div class="table-header">
      <div class="left-h">😔 기존 앱들</div>
      <div class="vs">VS</div>
      <div class="right-h">✨ 온담</div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>어색한 1:1 만남</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        편안한 그룹 모임
      </div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>외모 · 스펙 중심</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        취미 · 동네 기반
      </div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>젊은 사람 위주</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        50대 이상 전용
      </div>
    </div>

    <div class="row">
      <div class="left"><div class="dot"></div>복잡한 앱 사용법</div>
      <div class="right">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        쉽고 간단한 UI
      </div>
    </div>
  </div>

  <div class="bottom-msg">🥹🥹 50대 이상을 위해 만든 유일한 모임앱❤️</div>

  <div class="footer">
    <div class="footer-left">
      <img src="/Users/admin/chosim/ondam-promo/instagram/ondam-logo.png" alt="온담">
      <span class="tagline">좋은 모임, 따뜻한 만남</span>
    </div>
    <div class="cta-btn">지금 무료 가입 →</div>
  </div>
</div>
</body>
</html>
